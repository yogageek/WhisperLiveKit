name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:   # 手動觸發按鈕

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true      # 如果有大檔案(>10MB)才需要

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://xxxyo:$HF_TOKEN@huggingface.co/spaces/xxxyo/mywhisper main
