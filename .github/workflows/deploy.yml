name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload to HF Space (exclude binaries)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os

          api = HfApi()
          
          # 只上傳這些副檔名（排除 png/jit）
          ALLOWED_EXT = {'.py', '.txt', '.md', '.yaml', '.yml', '.json', '.sh', '.html', '.css', '.js', '.ts', '.toml', '.cfg', '.ini'}
          # 但 .onnx model 檔要保留
          ALLOWED_FILES = {'whisperlivekit/silero_vad_models/silero_vad.onnx',
                           'whisperlivekit/silero_vad_models/silero_vad_16k_op15.onnx',
                           'whisperlivekit/silero_vad_models/silero_vad_half.onnx',
                           'whisperlivekit/silero_vad_models/silero_vad.jit'}

          for root, dirs, files in os.walk('.'):
              # 跳過 .git
              dirs[:] = [d for d in dirs if d != '.git']
              for file in files:
                  filepath = os.path.join(root, file).lstrip('./')
                  ext = os.path.splitext(file)[1].lower()
                  if ext in ALLOWED_EXT or filepath in ALLOWED_FILES:
                      api.upload_file(
                          path_or_fileobj=filepath,
                          path_in_repo=filepath,
                          repo_id="xxxyo/mywhisper",
                          repo_type="space",
                          token=os.environ["HF_TOKEN"],
                      )
                      print(f"Uploaded: {filepath}")
          EOF
