name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          from pathlib import Path
          import os

          api = HfApi()

          SKIP_DIRS = {'.git', '.github', 'benchmarks', 'chrome-extension', 'scripts', 'tests'}
          SKIP_EXT = {'.png', '.jpg', '.jpeg', '.gif'}

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in SKIP_DIRS]
              for file in files:
                  local_path = os.path.join(root, file)
                  repo_path = str(Path(local_path).relative_to('.'))
                  ext = os.path.splitext(file)[1].lower()

                  if ext in SKIP_EXT:
                      print(f"Skipping: {repo_path}")
                      continue

                  try:
                      print(f"Uploading: {repo_path}")
                      api.upload_file(
                          path_or_fileobj=local_path,
                          path_in_repo=repo_path,
                          repo_id="xxxyo/mywhisper",
                          repo_type="space",
                          token=os.environ["HF_TOKEN"],
                      )
                  except Exception as e:
                      print(f"Error: {repo_path} -> {e}")
          EOF
